<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">

  <!-- ── Grand losange extérieur (Kente-style) ── -->
  <polygon points="50,4 96,50 50,96 4,50"
    fill="none" stroke="#1A1A1A" stroke-width="1.4"/>

  <!-- ── Losange médian ── -->
  <polygon points="50,22 78,50 50,78 22,50"
    fill="none" stroke="#1A1A1A" stroke-width="1.1"/>

  <!-- ── Losange intérieur plein ── -->
  <polygon points="50,36 64,50 50,64 36,50" fill="#1A1A1A"/>

  <!-- ── Triangles d'angle (s'assemblent en croix aux jonctions de tuiles) ── -->
  <polygon points="0,0 18,0 0,18" fill="#1A1A1A"/>
  <polygon points="100,0 82,0 100,18" fill="#1A1A1A"/>
  <polygon points="0,100 18,100 0,82" fill="#1A1A1A"/>
  <polygon points="100,100 82,100 100,82" fill="#1A1A1A"/>

  <!-- ── Petits triangles sur les sommets du grand losange ── -->
  <!-- haut -->
  <polygon points="50,4 45,13 55,13" fill="#1A1A1A"/>
  <!-- droite -->
  <polygon points="96,50 87,45 87,55" fill="#1A1A1A"/>
  <!-- bas -->
  <polygon points="50,96 45,87 55,87" fill="#1A1A1A"/>
  <!-- gauche -->
  <polygon points="4,50 13,45 13,55" fill="#1A1A1A"/>

  <!-- ── Petits triangles sur les sommets du losange médian ── -->
  <!-- haut -->
  <polygon points="50,22 46,29 54,29" fill="#1A1A1A"/>
  <!-- droite -->
  <polygon points="78,50 71,46 71,54" fill="#1A1A1A"/>
  <!-- bas -->
  <polygon points="50,78 46,71 54,71" fill="#1A1A1A"/>
  <!-- gauche -->
  <polygon points="22,50 29,46 29,54" fill="#1A1A1A"/>

  <!-- ── Diagonales vers les angles (lignes de liaison) ── -->
  <line x1="0" y1="0" x2="22" y2="22" stroke="#1A1A1A" stroke-width="0.8"/>
  <line x1="100" y1="0" x2="78" y2="22" stroke="#1A1A1A" stroke-width="0.8"/>
  <line x1="0" y1="100" x2="22" y2="78" stroke="#1A1A1A" stroke-width="0.8"/>
  <line x1="100" y1="100" x2="78" y2="78" stroke="#1A1A1A" stroke-width="0.8"/>

  <!-- ── Petits losanges décoratifs sur les coins intérieurs ── -->
  <polygon points="22,22 26,18 30,22 26,26" fill="#1A1A1A"/>
  <polygon points="78,22 74,18 70,22 74,26" fill="#1A1A1A"/>
  <polygon points="22,78 26,74 30,78 26,82" fill="#1A1A1A"/>
  <polygon points="78,78 74,74 70,78 74,82" fill="#1A1A1A"/>

</svg>
